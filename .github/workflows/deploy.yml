name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: 'gradle'

      # 3. Gradle 권한
      - name: Grant gradlew permission
        run: chmod +x gradlew

      # 4. 빌드
      - name: Build Spring Boot
        run: ./gradlew clean build -x test

      # 5. JAR 업로드 (⚠️ app 루트로 바로)
      - name: Upload JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          source: build/libs/collabo-0.0.1-SNAPSHOT.jar
          target: /home/ubuntu/app
          strip_components: 2

      # 6. 서비스 재시작
      - name: Restart Backend Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            echo "== Move to Application Directory =="
            cd /home/ubuntu/app

            echo "== Find and Kill Existing Java Process =="
            # 실행 중인 collabo JAR 프로세스의 PID를 찾습니다.
            CURRENT_PID=$(lsof -t -i:8080)

            if [ -z "$CURRENT_PID" ]; then
              echo "No running process found."
            else
              echo "Found process PID: $CURRENT_PID. Killing it..."
              kill -15 $CURRENT_PID
              sleep 3
            fi

            echo "== Start New Application with nohup =="
            # 배포 로그는 같은 폴더의 nohup.out 파일에 기록됩니다.
            nohup java -jar collabo-0.0.1-SNAPSHOT.jar > nohup.out 2>&1 &

            echo "== Check Running Process =="
            sleep 2
            pgrep -f "collabo-0.0.1-SNAPSHOT.jar"